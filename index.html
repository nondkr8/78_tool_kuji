<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カスタムくじ引きツール Pro</title>
    <style>
        :root {
            --bg-image: none;
            /* タイトル用 */
            --title-font: "sans-serif";
            --title-color: #333333;
            --title-size: 40px;
            --title-weight: bold;
            /* 結果用 */
            --result-font: "sans-serif";
            --result-color: #333333;
            --result-weight: bold;
            /* ボタン用 */
            --btn-font: "sans-serif";
            --btn-bg-color: #ff4757;
            --btn-text-color: #ffffff;
            --btn-weight: bold;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-color: #ffffff;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background 0.3s ease;
        }

        /* 左側：メイン表示エリア */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative; 
        }

        .content-group {
            transform: translateY(-20px);
        }

        #main-title {
            font-family: var(--title-font);
            color: var(--title-color);
            font-size: var(--title-size);
            font-weight: var(--title-weight);
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            margin-bottom: 20px;
        }

        #result-display {
            font-family: var(--result-font);
            color: var(--result-color);
            font-weight: var(--result-weight);
            font-size: 6rem;
            text-shadow: 2px 2px 10px rgba(255,255,255,0.9);
            min-height: 1.2em;
        }

        .button-wrapper {
            position: absolute;
            bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #draw-button {
            font-family: var(--btn-font);
            background-color: var(--btn-bg-color);
            color: var(--btn-text-color);
            font-weight: var(--btn-weight);
            border: none;
            padding: 20px 80px;
            font-size: 2.2rem;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        #draw-button:hover { opacity: 0.8; }
        #draw-button:active { transform: scale(0.95); }

        /* 右側：設定パネル */
        .side-panel {
            width: 380px;
            background: rgba(255, 255, 255, 0.95);
            border-left: 1px solid #ddd;
            padding: 20px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        h3 { margin: 0 0 15px 0; color: #ff4757; border-bottom: 2px solid #ff4757; padding-bottom: 5px; }
        h4 { margin: 15px 0 8px 0; font-size: 0.9rem; background: #f0f0f0; padding: 5px; border-left: 4px solid #ff4757; }
        
        .setting-item { margin-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 0.8rem; color: #444; }
        
        textarea, input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .flex-row { display: flex; gap: 8px; align-items: center; }
        .flex-row > * { flex: 1; }

        input[type="color"] { width: 100%; height: 35px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: none; }
        
        .bold-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-container" id="main-area">
        <div class="content-group">
            <div id="main-title">本日の運勢くじ</div>
            <div id="result-display">？？？</div>
        </div>
        <div class="button-wrapper">
            <button id="draw-button" onclick="drawKuji()">くじを引く！</button>
        </div>
    </div>

    <div class="side-panel">
        <h3>🛠 カスタム設定</h3>

        <h4>🖼 背景設定</h4>
        <div class="setting-item">
            <input type="file" id="bg-input" accept="image/*">
        </div>

        <h4>📝 題名（タイトル）設定</h4>
        <div class="setting-item">
            <input type="text" id="title-text" value="本日の運勢くじ">
        </div>
        <div class="setting-item">
            <div class="flex-row">
                <div>
                    <label>フォント名</label>
                    <input type="text" id="title-font" placeholder="Meiryo">
                </div>
                <div style="flex:0.4">
                    <label>サイズ</label>
                    <input type="number" id="title-size" value="40">
                </div>
            </div>
        </div>
        <div class="setting-item">
            <div class="flex-row">
                <input type="color" id="title-color" value="#333333">
                <label class="bold-toggle"><input type="checkbox" id="title-bold" checked> 太字</label>
            </div>
        </div>

        <h4>✨ くじ結果の設定</h4>
        <div class="setting-item">
            <label>フォント名</label>
            <input type="text" id="result-font" placeholder="HG行書体">
        </div>
        <div class="setting-item">
            <div class="flex-row">
                <input type="color" id="result-color" value="#333333">
                <label class="bold-toggle"><input type="checkbox" id="result-bold" checked> 太字</label>
            </div>
        </div>

        <h4>🔘 ボタンの設定</h4>
        <div class="setting-item">
            <label>フォント名</label>
            <input type="text" id="btn-font" placeholder="sans-serif">
        </div>
        <div class="setting-item">
            <div class="flex-row">
                <div>
                    <label>背景色</label>
                    <input type="color" id="btn-bg-color" value="#ff4757">
                </div>
                <div>
                    <label>文字色</label>
                    <input type="color" id="btn-text-color" value="#ffffff">
                </div>
                <label class="bold-toggle"><input type="checkbox" id="btn-bold" checked> 太字</label>
            </div>
        </div>

        <h4>📋 くじの内容（改行区切り）</h4>
        <textarea id="kuji-list" rows="8">大吉
中吉
小吉
吉
末吉
凶</textarea>
    </div>

    <script>
        // 要素の取得
        const inputs = {
            bg: document.getElementById('bg-input'),
            titleText: document.getElementById('title-text'),
            titleFont: document.getElementById('title-font'),
            titleSize: document.getElementById('title-size'),
            titleColor: document.getElementById('title-color'),
            titleBold: document.getElementById('title-bold'),
            resultFont: document.getElementById('result-font'),
            resultColor: document.getElementById('result-color'),
            resultBold: document.getElementById('result-bold'),
            btnFont: document.getElementById('btn-font'),
            btnBg: document.getElementById('btn-bg-color'),
            btnText: document.getElementById('btn-text-color'),
            btnBold: document.getElementById('btn-bold')
        };

        const displays = {
            title: document.getElementById('main-title'),
            result: document.getElementById('result-display'),
            btn: document.getElementById('draw-button')
        };

        // イベント設定：背景
        inputs.bg.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => document.body.style.backgroundImage = `url('${ev.target.result}')`;
                reader.readAsDataURL(file);
            }
        });

        // イベント設定：タイトル
        inputs.titleText.addEventListener('input', (e) => displays.title.textContent = e.target.value);
        inputs.titleFont.addEventListener('input', (e) => document.documentElement.style.setProperty('--title-font', e.target.value || 'sans-serif'));
        inputs.titleSize.addEventListener('input', (e) => document.documentElement.style.setProperty('--title-size', e.target.value + 'px'));
        inputs.titleColor.addEventListener('input', (e) => document.documentElement.style.setProperty('--title-color', e.target.value));
        inputs.titleBold.addEventListener('change', (e) => document.documentElement.style.setProperty('--title-weight', e.target.checked ? 'bold' : 'normal'));

        // イベント設定：結果
        inputs.resultFont.addEventListener('input', (e) => document.documentElement.style.setProperty('--result-font', e.target.value || 'sans-serif'));
        inputs.resultColor.addEventListener('input', (e) => document.documentElement.style.setProperty('--result-color', e.target.value));
        inputs.resultBold.addEventListener('change', (e) => document.documentElement.style.setProperty('--result-weight', e.target.checked ? 'bold' : 'normal'));

        // イベント設定：ボタン
        inputs.btnFont.addEventListener('input', (e) => document.documentElement.style.setProperty('--btn-font', e.target.value || 'sans-serif'));
        inputs.btnBg.addEventListener('input', (e) => document.documentElement.style.setProperty('--btn-bg-color', e.target.value));
        inputs.btnText.addEventListener('input', (e) => document.documentElement.style.setProperty('--btn-text-color', e.target.value));
        inputs.btnBold.addEventListener('change', (e) => document.documentElement.style.setProperty('--btn-weight', e.target.checked ? 'bold' : 'normal'));

        // くじ引き機能
        function drawKuji() {
            const list = document.getElementById('kuji-list').value.split('\n').map(s => s.trim()).filter(s => s !== "");
            if (list.length === 0) return;
            let count = 0;
            const timer = setInterval(() => {
                displays.result.textContent = list[Math.floor(Math.random() * list.length)];
                if (++count > 12) {
                    clearInterval(timer);
                    displays.result.textContent = list[Math.floor(Math.random() * list.length)];
                }
            }, 60);
        }
    </script>
</body>
</html>
